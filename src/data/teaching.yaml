courses:
  - id: applied-robotics-ccam
    title: "Applied Robotics and Control for Cooperative and Autonomous Mobility"
    role: "Lecturer"
    semester: "Summer 2026"
    institution: "Dresden University of Technology"
    description: "This course introduces the fundamental principles of autonomous and cooperative driving systems through a combination of theory and hands-on experimentation with mobile robots in a scaled laboratory environment. Students learn how autonomous vehicles perceive their surroundings, make decisions, collaborate with other traffic participants, and act safely within a shared traffic space. The course covers key aspects of traffic phenomena such as safety, congestion, and emissions, along with the architecture of modern autonomous driving systems, including sensors, control algorithms, and communication technologies, with practical examples such as Cooperative Adaptive Cruise Control (CACC)."
    materials: "https://bildungsportal.sachsen.de/opal/auth/RepositoryEntry/53827993603"

  - id: road-traffic-control
    title: "Technologies of Road Traffic Control"
    role: "Teaching Assistant"
    semester: "Winter 2025/26"
    institution: "Dresden University of Technology"
    description: "The course covers the theoretical principles of traffic flow and practical applications for traffic control. Students will be able to independently generate, test, and evaluate the performance of traffic control systems. In addition to controlling individual systems, students will master coordinated and traffic-dependent control systems in practical environments. Students will gain knowledge of procedures and methods for higher-level control systems that encompass road networks."
    materials: "https://bildungsportal.sachsen.de/opal/auth/RepositoryEntry/13918699524"

  - id: optimal-control
    title: "Optimal Control, Methods and Procedures of Decision Making"
    role: "Teaching Assistant"
    semester: "Winter 2024/25"
    institution: "Dresden University of Technology"
    description: ""
    materials: ""

