bio_short: >
  I am a researcher working at the intersection of traffic data science, artificial intelligence, 
  and intelligent mobility systems. My work focuses on developing data-driven methods for understanding, 
  imputing, detecting anomalies in, and forecasting traffic data using spatiotemporal deep learning approaches.

bio_long: >
  My research sits at the intersection of transportation engineering and data science. I develop 
  computational methods for traffic data imputation, anomaly detection, and forecasting, leveraging 
  spatiotemporal deep learning and foundation models. I am also interested in connected and cooperative 
  autonomous mobility (CCAM), digital twin mobility systems, and public transport data analytics.
  
  Beyond research, I enjoy travelling, photography, contributing to Wikipedia, and engaging with 
  cultural communities. I believe in open science, reproducible research, and building tools that 
  make traffic data science more accessible.

research_interests:
  - Traffic Data Imputation
  - Traffic Anomaly Detection
  - Traffic Forecasting
  - Spatiotemporal Deep Learning
  - Foundation Models for Traffic Data
  - CCAM & Digital Twin Mobility Systems
  - Public Transport Data Analytics

